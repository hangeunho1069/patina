<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>patina - SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="shop-page">

  <header class="header archive-header">
    <div class="logo">
      <a href="./index.html"><img src="./logoG.png" alt="patina header logo"></a>
    </div>
    <nav class="nav">
      <a href="./about.html">ABOUT</a>
      <a href="./shop.html" class="active">SHOP</a>
      <a href="#">CONTACT</a>
      <a href="#">DONATE</a>
      <div class="hamburger">
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <main class="shop-container">
    
    <div class="shop-filter">
      <span class="filter-item active">All</span>
      <span class="filter-item">Chair</span>
      <span class="filter-item">Desk</span>
      <span class="filter-item">etc</span>
    </div>

    <section class="shop-grid">
      
      <div class="shop-card-wrapper">
        <div class="shop-card" style="background-image: url('./Group 51.png');">
          <div class="cover color-darkgreen slide-left"></div>
        </div>
        <div class="shop-item-info">
          <span class="item-number">01</span>
          <div class="item-text">
            <h3>Graft 001</h3>
            <p>Chair</p>
          </div>
        </div>
      </div>

      <div class="shop-card-wrapper">
        <div class="shop-card" style="background-image: url('./Group 52.png');">
          <div class="cover color-olive slide-up"></div>
        </div>
        <div class="shop-item-info">
          <span class="item-number">02</span>
          <div class="item-text">
            <h3>Graft 002</h3>
            <p>Desk</p>
          </div>
        </div>
      </div>

      <div class="shop-card-wrapper">
        <div class="shop-card" style="background-image: url('./Group 53.png');">
          <div class="cover color-lightgreen slide-right"></div>
        </div>
        <div class="shop-item-info">
          <span class="item-number">03</span>
          <div class="item-text">
            <h3>Graft 003</h3>
            <p>etc</p>
          </div>
        </div>
      </div>

      <div class="shop-card-wrapper">
        <a href="./archive.html" style="display: block; text-decoration: none;">
          <div class="shop-card" style="background-image: url('./Mask group.png');">
            <div class="cover color-darkgreen slide-down"></div>
          </div>
        </a>
        <div class="shop-item-info">
          <span class="item-number">04</span>
          <div class="item-text">
            <h3>Graft 004</h3>
            <p>Table / Object</p>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
