<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>patina - SHOP</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="shop-page">

  <!-- 상단 네비게이션 헤더 (하얀 배경 바 형태) -->
  <header class="header archive-header">
    <div class="logo">
      <a href="./index.html"><img src="./logoG.png" alt="patina header logo"></a>
    </div>
    <nav class="nav">
      <a href="./about.html">ABOUT</a>
      <a href="./shop.html" class="active">SHOP</a>
      <a href="#">CONTACT</a>
      <a href="#">DONATE</a>
      <div class="hamburger">
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <!-- 메인 숍 섹션 -->
  <main class="shop-wrapper">
    
    <!-- [시안 매칭] 상단 Shop 타이틀 및 슬로건 -->
    <div class="shop-header-text">
      <h2>Shop</h2>
      <p>One and only object for me.</p>
    </div>

    <!-- [시안 매칭] 불규칙 모자이크 마스터 그리드 컨테이너 -->
    <div class="shop-mosaic-grid">
      
      <!-- 1번 이미지 (가로로 긴 이어폰) -->
      <div class="grid-item item-1" style="background-image: url('./Group 51.png');">
        <div class="cover color-darkgreen slide-left"></div>
      </div>

      <!-- 2번 이미지 (우측 상단 투명 오렌지 라이터) -->
      <div class="grid-item item-2" style="background-image: url('./Group 52.png');">
        <div class="cover color-olive slide-up"></div>
      </div>

      <!-- 3번 이미지 (좌측 세로로 긴 칼하트 라이터 케이스) -->
      <div class="grid-item item-3" style="background-image: url('./Group 53.png');">
        <div class="cover color-lightgreen slide-left"></div>
      </div>

      <!-- 4번 이미지 (우측 중간 흔들의자) -->
      <div class="grid-item item-4" style="background-image: url('./Group 54.png');">
        <div class="cover color-lightgreen slide-right"></div>
      </div>

      <!-- 5번 이미지 (우측 하단 흰색 다리 의자들) -->
      <div class="grid-item item-5" style="background-image: url('./Mask group.png');">
        <div class="cover color-darkgreen slide-down"></div>
      </div>

      <!-- [시안 매칭] 좌측 하단 독자적인 무브 투 아카이브 타원형 버튼 -->
      <div class="grid-item item-btn-zone">
        <a href="./archive.html" class="move-archive-btn">MOVE TO ARCHIVE</a>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
