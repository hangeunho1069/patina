<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>patina</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="logo">patina</div>
    <nav class="nav">
      <a href="#">ABOUT</a>
      <a href="#">SHOP</a>
      <a href="#">CONTACT</a>
      <a href="#">DONATE</a>
      <div class="hamburger">
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <section class="hero-section">
    <div class="hero-bg">
      <h1 class="main-title">patina</h1>
    </div>
  </section>

  <section class="grid-section">
    <div class="grid-container">
      
      <div class="card" style="background-image: url('images/item1.jpg');">
        <div class="cover color-darkgreen slide-left"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item2.jpg');">
        <div class="cover color-olive slide-up"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item3.jpg');">
        <div class="cover color-lightgreen slide-right"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item4.jpg');">
        <div class="cover color-lightgreen slide-left"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item5.jpg');">
        <div class="cover color-darkgreen slide-down"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item6.jpg');">
        <div class="cover color-olive slide-right"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item7.jpg');">
        <div class="cover color-olive slide-left"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item8.jpg');">
        <div class="cover color-lightgreen slide-down"></div>
      </div>
      
      <div class="card" style="background-image: url('images/item9.jpg');">
        <div class="cover color-darkgreen slide-right"></div>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
