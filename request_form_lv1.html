<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>patina - Request: Standard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="request-form-lv1-page">

  <header class="header archive-header">
    <div class="logo">
      <a href="./index.html"><img src="./logoG.png" alt="patina header logo"></a>
    </div>
    <nav class="nav">
      <a href="./about.html">ABOUT</a>
      <a href="./shop.html">SHOP</a>
      <a href="./contact.html" class="active">CONTACT</a>
      <a href="./donate.html">DONATE</a>
      <div class="hamburger">
        <span></span>
        <span></span>
      </div>
    </nav>
  </header>

  <main class="form-wrapper bounce-up-animation">
    
    <div class="form-header-zone-lv1">
      <a href="./request_form.html" class="form-back-arrow">←</a>
      <h2 class="form-main-title-lv1">Request: Standard</h2>
    </div>

    <section class="lv1-form-section">
      <form id="lv1RequestForm" class="actual-lv1-form" onsubmit="return false;">
        
        <div class="input-group-lv1">
          <label>Object name</label>
          <input type="text" id="objName" required>
        </div>

        <div class="input-group-lv1">
          <label>Object type</label>
          <div class="radio-selector-group">
            <label class="radio-container">
              <input type="radio" name="objType" value="Clothing" required>
              <span class="custom-radio"></span> Clothing
            </label>
            <label class="radio-container">
              <input type="radio" name="objType" value="Bag">
              <span class="custom-radio"></span> Bag
            </label>
            <label class="radio-container">
              <input type="radio" name="objType" value="Furniture">
              <span class="custom-radio"></span> Furniture
            </label>
            <label class="radio-container">
              <input type="radio" name="objType" value="Other" id="typeOtherRadio">
              <span class="custom-radio"></span> Other
            </label>
            <div class="other-underline-box">
              <span>:</span>
              <input type="text" id="objTypeOtherText" class="underline-input" disabled>
            </div>
          </div>
        </div>

       <div class="input-group-lv1">
          <label>Size</label>
          <div class="radio-selector-group">
            
            <label class="radio-container">
              <input type="radio" name="objSize" value="Small" required>
              <span class="custom-radio"></span> 
              <div class="radio-label-content">
                <span class="size-title">Small</span>
                <span class="size-guide-desc">한 손에 들어오는 소형 소품 및 패션 잡화 (지갑, 파우치, 장갑, 벨트 등)</span>
              </div>
            </label>
            
            <label class="radio-container">
              <input type="radio" name="objSize" value="Medium">
              <span class="custom-radio"></span>
              <div class="radio-label-content">
                <span class="size-title">Medium</span>
                <span class="size-guide-desc">일반적인 수거 박스에 담기는 크기의 의류 및 소형 가구 (재킷, 토트백, 1인용 스툴/의자 등)</span>
              </div>
            </label>
            
            <label class="radio-container">
              <input type="radio" name="objSize" value="Large">
              <span class="custom-radio"></span>
              <div class="radio-label-content">
                <span class="size-title">Large</span>
                <span class="size-guide-desc">부피가 큰 아우터 및 개별 배송이 필요한 대형 가구 (롱코트, 벤치, 다이닝 테이블, 선반 등)</span>
              </div>
            </label>
            
          </div>
        </div>

        <div class="input-group-lv1">
          <label>Upload photos</label>
          <p class="upload-sub-label-lv1">현재 제품의 상태가 잘 들어나는 이미지 1~5장</p>
          
          <div class="photo-upload-box-canvas" id="uploadZone">
            <input type="file" id="objPhotos" multiple accept="image/*" style="display: none;">
            <div class="canvas-center-icon">
              <i class="fa-regular fa-image" style="font-size: 32px; color: #666;"></i>
            </div>
            <div class="file-preview-list" id="filePreview"></div>
          </div>
        </div>

        <div class="input-group-lv1">
          <label>Additional notes</label>
          <p class="upload-sub-label-lv1">요청사항과 제품에 담긴 추억에 대해 자유롭게 서술해주세요!</p>
          <textarea id="objNotes" rows="8" required></textarea>
        </div>

        <div class="form-submit-zone-lv1">
          <button type="submit" class="submit-action-btn-lv1">SUBMIT</button>
        </div>

      </form>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
